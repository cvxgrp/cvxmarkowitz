name: (RHIZA) WEEKLY

permissions:
  contents: read

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  dep-compat-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Upgrade dependencies and run tests
        run: |
          uv sync --upgrade
          make test

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Run semgrep
        run: |
          make semgrep

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Run pip-audit
        run: |
          uvx pip-audit

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: README.md
          fail: true
